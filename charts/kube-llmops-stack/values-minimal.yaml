# Minimal profile: 1 small model + LiteLLM gateway + basic monitoring
# Usage: helm install kube-llmops charts/kube-llmops-stack -f charts/kube-llmops-stack/values-minimal.yaml
#
# GPU-specific tuning (add to your own override file if needed):
#   --enforce-eager: ""              # Required for Blackwell (SM 12.0) GPUs
#   --attention-backend: TRITON_ATTN # If FlashAttention hangs on your GPU
#   --gpu-memory-utilization: "0.8"  # Reduce if OOM on small-VRAM cards

models:
  - name: qwen2-5-0-5b
    source: Qwen/Qwen2.5-0.5B-Instruct
    engine: vllm
    replicas: 1
    resources:
      gpu: 1
      memory: 8Gi

vllm:
  enabled: true
  models:
    - name: qwen2-5-0-5b
      source: Qwen/Qwen2.5-0.5B-Instruct
      engine: vllm
      replicas: 1
      resources:
        gpu: 1
        memory: 8Gi

llamacpp:
  enabled: true
  models: []

tei:
  enabled: true
  models: []

litellm:
  enabled: true
  masterKey: sk-kube-llmops-dev
  models:
    - name: qwen2-5-0-5b
      source: Qwen/Qwen2.5-0.5B-Instruct
      engine: vllm
  postgresql:
    auth:
      password: llmops-pg-dev-pw

observability:
  enabled: true
  dcgmExporter:
    enabled: true
  grafana:
    adminPassword: admin

langfuse:
  enabled: false

logging:
  enabled: false

keda:
  enabled: false
