# Minimal profile: 1 small model, basic monitoring, smallest footprint
# Usage: helm install kube-llmops charts/kube-llmops-stack -f charts/kube-llmops-stack/values-minimal.yaml

models:
  - name: qwen3.5-0.8b
    source: Qwen/Qwen3.5-0.8B
    engine: auto
    replicas: 1
    resources:
      gpu: 1
      memory: 8Gi

litellm:
  enabled: true
  masterKey: sk-kube-llmops-dev

observability:
  enabled: true
  dcgmExporter:
    enabled: true

langfuse:
  enabled: false

logging:
  enabled: false

keda:
  enabled: false
