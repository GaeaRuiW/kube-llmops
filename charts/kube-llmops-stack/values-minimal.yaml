# Minimal profile: 1 small model + LiteLLM gateway + basic monitoring
# Usage: helm install kube-llmops charts/kube-llmops-stack -f charts/kube-llmops-stack/values-minimal.yaml

models:
  - name: qwen3.5-0.8b
    source: Qwen/Qwen3.5-0.8B
    engine: vllm
    replicas: 1
    resources:
      gpu: 1
      memory: 8Gi

vllm:
  enabled: true
  models:
    - name: qwen3.5-0.8b
      source: Qwen/Qwen3.5-0.8B
      engine: vllm
      replicas: 1
      resources:
        gpu: 1
        memory: 8Gi

llamacpp:
  enabled: true
  models: []

tei:
  enabled: true
  models: []

litellm:
  enabled: true
  masterKey: sk-kube-llmops-dev
  models:
    - name: qwen3.5-0.8b
      source: Qwen/Qwen3.5-0.8B
      engine: vllm
  postgresql:
    auth:
      password: llmops-pg-dev-pw

observability:
  enabled: false

langfuse:
  enabled: false

logging:
  enabled: false

keda:
  enabled: false
