# kube-llmops-stack default values

global:
  # Set to false for CPU-only environments (CI, dev without GPU)
  gpu: true
  # Image pull policy
  imagePullPolicy: IfNotPresent

# -- Model definitions
# Each model will be deployed with the auto-selected or explicitly specified engine.
# Example:
#   models:
#     - name: qwen3.5-0.8b
#       source: Qwen/Qwen3.5-0.8B
#       engine: auto              # auto | vllm | llamacpp | sglang | tei
#       replicas: 1
#       resources:
#         gpu: 1
#         memory: 16Gi
#       engineArgs: {}            # Additional engine-specific arguments
models: []

# -- vLLM engine configuration (sub-chart)
# models[] is injected into vllm.models automatically
vllm:
  enabled: true
  models: []                  # Populated from top-level models[] at install time
  image:
    repository: vllm/vllm-openai
    tag: latest
    pullPolicy: IfNotPresent
  service:
    type: ClusterIP
    port: 8000
  modelLoader:
    enabled: true
    image:
      repository: ghcr.io/gaearuiw/kube-llmops/model-loader
      tag: latest
      pullPolicy: IfNotPresent
    hfToken: ""               # Set via --set vllm.modelLoader.hfToken=xxx
  modelCache:
    enabled: true
    storageClass: ""
    size: 50Gi
    existingClaim: ""
  readinessProbe:
    initialDelaySeconds: 30
    periodSeconds: 10
    timeoutSeconds: 5
    failureThreshold: 30
  livenessProbe:
    initialDelaySeconds: 60
    periodSeconds: 30
    timeoutSeconds: 5
    failureThreshold: 3
  gpuToleration:
    key: nvidia.com/gpu
    operator: Exists
    effect: NoSchedule

# -- llama.cpp engine configuration (sub-chart, for GGUF models)
llamacpp:
  enabled: true
  models: []
  image:
    repository: ghcr.io/ggerganov/llama.cpp
    tag: server
    pullPolicy: IfNotPresent
  service:
    type: ClusterIP
    port: 8080
  modelCache:
    enabled: true
    storageClass: ""
    size: 30Gi
    existingClaim: ""
  readinessProbe:
    initialDelaySeconds: 15
    periodSeconds: 10
    timeoutSeconds: 5
    failureThreshold: 20
  livenessProbe:
    initialDelaySeconds: 30
    periodSeconds: 30
    timeoutSeconds: 5
    failureThreshold: 3
  gpuToleration:
    key: nvidia.com/gpu
    operator: Exists
    effect: NoSchedule

# -- TEI engine configuration (sub-chart, for embedding & reranking models)
tei:
  enabled: true
  models: []
  image:
    repository: ghcr.io/huggingface/text-embeddings-inference
    tag: latest
    pullPolicy: IfNotPresent
  service:
    type: ClusterIP
    port: 8080
  modelCache:
    enabled: true
    storageClass: ""
    size: 10Gi
    existingClaim: ""
  readinessProbe:
    initialDelaySeconds: 15
    periodSeconds: 10
    timeoutSeconds: 5
    failureThreshold: 20
  livenessProbe:
    initialDelaySeconds: 30
    periodSeconds: 30
    timeoutSeconds: 5
    failureThreshold: 3
  gpuToleration:
    key: nvidia.com/gpu
    operator: Exists
    effect: NoSchedule

# -- AI Gateway (LiteLLM)
litellm:
  enabled: true
  models: []                  # Populated from top-level models[] for config generation
  replicas: 1
  masterKey: ""               # Set via --set or secret. REQUIRED.
  image:
    repository: ghcr.io/berriai/litellm
    tag: main-stable
    pullPolicy: IfNotPresent
  service:
    type: ClusterIP
    port: 4000
  resources:
    requests:
      cpu: 500m
      memory: 512Mi
    limits:
      cpu: "2"
      memory: 1Gi
  readinessProbe:
    httpGet:
      path: /health/liveliness
      port: 4000
    initialDelaySeconds: 15
    periodSeconds: 10
    timeoutSeconds: 5
    failureThreshold: 10
  livenessProbe:
    httpGet:
      path: /health/liveliness
      port: 4000
    initialDelaySeconds: 30
    periodSeconds: 30
    timeoutSeconds: 5
    failureThreshold: 3
  # PostgreSQL for LiteLLM
  postgresql:
    enabled: true
    image:
      repository: postgres
      tag: "16-alpine"
    auth:
      database: litellm
      username: litellm
      password: ""            # Set via --set or secret
    storage:
      size: 5Gi
      storageClass: ""
    service:
      port: 5432

# -- Observability (sub-chart)
observability:
  enabled: true
  otelCollector:
    enabled: true
    image:
      repository: otel/opentelemetry-collector-contrib
      tag: 0.114.0
      pullPolicy: IfNotPresent
  prometheus:
    enabled: true
    image:
      repository: prom/prometheus
      tag: v2.54.1
      pullPolicy: IfNotPresent
    retention: 15d
    storage:
      size: 20Gi
      storageClass: ""
  dcgmExporter:
    enabled: true
    image:
      repository: nvcr.io/nvidia/k8s/dcgm-exporter
      tag: 3.3.8-3.6.0-ubuntu22.04
      pullPolicy: IfNotPresent
  grafana:
    enabled: true
    image:
      repository: grafana/grafana
      tag: 11.3.0
      pullPolicy: IfNotPresent
    adminPassword: ""         # Set via --set or secret
    service:
      type: ClusterIP
      port: 3000
    storage:
      size: 2Gi
      storageClass: ""

# -- LLM Tracing (Langfuse)
langfuse:
  enabled: false              # Off in minimal, on in standard+
  image:
    repository: langfuse/langfuse
    tag: latest
    pullPolicy: IfNotPresent
  replicas: 1
  service:
    type: ClusterIP
    port: 3000
  auth:
    nextAuthSecret: kube-llmops-langfuse-secret
    salt: kube-llmops-langfuse-salt
  postgresql:
    enabled: false            # Reuse LiteLLM's PG by default
    auth:
      database: langfuse
      username: langfuse
      password: langfuse-default-pw

# -- Logging
logging:
  enabled: false              # Off in minimal, on in standard+
  # Fluentbit
  fluentbit:
    enabled: true
  # Loki
  loki:
    enabled: true

# -- Autoscaling (KEDA)
keda:
  enabled: false              # Off in minimal, on in standard+

# -- Distributed Model Cache (Fluid)
fluid:
  enabled: false              # Off in minimal, on in production

# -- Object Storage (MinIO)
minio:
  enabled: false

# -- Model Registry (Harbor)
harbor:
  enabled: false

# -- Vector Database
milvus:
  enabled: false

# -- Auth (Keycloak)
keycloak:
  enabled: false

# -- Ingress
ingress:
  enabled: false
  className: nginx
  host: llm.example.com
  tls: false
