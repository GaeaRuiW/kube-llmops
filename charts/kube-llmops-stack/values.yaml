# kube-llmops-stack default values

global:
  # Set to false for CPU-only environments (CI, dev without GPU)
  gpu: true
  # Image pull policy
  imagePullPolicy: IfNotPresent

# -- Model definitions
# Each model will be deployed with the auto-selected or explicitly specified engine.
# Example:
#   models:
#     - name: qwen3.5-0.8b
#       source: Qwen/Qwen3.5-0.8B
#       engine: auto              # auto | vllm | llamacpp | sglang | tei
#       replicas: 1
#       resources:
#         gpu: 1
#         memory: 16Gi
#       engineArgs: {}            # Additional engine-specific arguments
models: []

# -- vLLM engine configuration (sub-chart)
# models[] is injected into vllm.models automatically
vllm:
  enabled: true
  models: []                  # Populated from top-level models[] at install time
  image:
    repository: vllm/vllm-openai
    tag: latest
    pullPolicy: IfNotPresent
  service:
    type: ClusterIP
    port: 8000
  modelLoader:
    enabled: true
    image:
      repository: ghcr.io/gaearuiw/kube-llmops/model-loader
      tag: latest
      pullPolicy: IfNotPresent
    hfToken: ""               # Set via --set vllm.modelLoader.hfToken=xxx
  modelCache:
    enabled: true
    storageClass: ""
    size: 50Gi
    existingClaim: ""
  readinessProbe:
    initialDelaySeconds: 30
    periodSeconds: 10
    timeoutSeconds: 5
    failureThreshold: 30
  livenessProbe:
    initialDelaySeconds: 60
    periodSeconds: 30
    timeoutSeconds: 5
    failureThreshold: 3
  gpuToleration:
    key: nvidia.com/gpu
    operator: Exists
    effect: NoSchedule

# -- AI Gateway (LiteLLM)
litellm:
  enabled: true
  replicas: 1
  masterKey: ""               # Set via --set or secret. REQUIRED.
  # PostgreSQL for LiteLLM
  postgresql:
    enabled: true
    auth:
      database: litellm
      username: litellm
      password: ""            # Set via --set or secret

# -- Observability
observability:
  enabled: true
  # OpenTelemetry Collector
  otelCollector:
    enabled: true
  # Prometheus
  prometheus:
    enabled: true
  # DCGM Exporter (GPU metrics) -- only when global.gpu=true
  dcgmExporter:
    enabled: true
  # Grafana
  grafana:
    enabled: true
    adminPassword: ""         # Set via --set or secret

# -- LLM Tracing (Langfuse)
langfuse:
  enabled: false              # Off in minimal, on in standard+
  postgresql:
    # Reuse LiteLLM's PostgreSQL by default (separate database)
    enabled: false

# -- Logging
logging:
  enabled: false              # Off in minimal, on in standard+
  # Fluentbit
  fluentbit:
    enabled: true
  # Loki
  loki:
    enabled: true

# -- Autoscaling (KEDA)
keda:
  enabled: false              # Off in minimal, on in standard+

# -- Distributed Model Cache (Fluid)
fluid:
  enabled: false              # Off in minimal, on in production

# -- Object Storage (MinIO)
minio:
  enabled: false

# -- Model Registry (Harbor)
harbor:
  enabled: false

# -- Vector Database
milvus:
  enabled: false

# -- Auth (Keycloak)
keycloak:
  enabled: false

# -- Ingress
ingress:
  enabled: false
  className: nginx
  host: llm.example.com
  tls: false
