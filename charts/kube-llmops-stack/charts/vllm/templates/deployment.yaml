{{/*
This template renders one Deployment per model entry that uses vllm engine.
It is called from the parent chart with model-specific context.
*/}}
{{- range $idx, $model := .Values.models }}
{{- if or (eq (default "auto" $model.engine) "vllm") (eq (default "auto" $model.engine) "auto") }}
{{- $resources := default dict $model.resources }}
{{- $gpu := ternary (int $resources.gpu) 1 (hasKey $resources "gpu") }}
{{- $memory := default "16Gi" $resources.memory }}
{{- $cpu := default "4" $resources.cpu }}
{{- $replicas := default 1 $model.replicas }}
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: vllm-{{ $model.name }}
  labels:
    app.kubernetes.io/name: vllm
    app.kubernetes.io/instance: {{ $.Release.Name }}
    app.kubernetes.io/component: model-serving
    app.kubernetes.io/part-of: kube-llmops
    kube-llmops/model: {{ $model.name }}
    kube-llmops/engine: vllm
spec:
  replicas: {{ $replicas }}
  strategy:
    type: Recreate
  selector:
    matchLabels:
      app.kubernetes.io/name: vllm
      app.kubernetes.io/instance: {{ $.Release.Name }}
      kube-llmops/model: {{ $model.name }}
  template:
    metadata:
      labels:
        app.kubernetes.io/name: vllm
        app.kubernetes.io/instance: {{ $.Release.Name }}
        app.kubernetes.io/component: model-serving
        app.kubernetes.io/part-of: kube-llmops
        kube-llmops/model: {{ $model.name }}
        kube-llmops/engine: vllm
    spec:
      {{- if or $.Values.modelLoader.enabled $.Values.customCACert.enabled }}
      initContainers:
        {{- if $.Values.customCACert.enabled }}
        - name: ca-cert-installer
          image: "{{ $.Values.image.repository }}:{{ $.Values.image.tag }}"
          command: ["/bin/bash", "-c"]
          args:
            - |
              cp /custom-ca/* /usr/local/share/ca-certificates/ 2>/dev/null || true
              update-ca-certificates 2>/dev/null || cat /custom-ca/*.crt >> /etc/ssl/certs/ca-certificates.crt
              cp /etc/ssl/certs/ca-certificates.crt /ca-out/ca-certificates.crt
              echo "CA certs updated"
          volumeMounts:
            - name: custom-ca
              mountPath: /custom-ca
              readOnly: true
            - name: ca-bundle
              mountPath: /ca-out
        {{- end }}
        {{- if $.Values.modelLoader.enabled }}
        - name: model-loader
          image: "{{ $.Values.modelLoader.image.repository }}:{{ $.Values.modelLoader.image.tag }}"
          imagePullPolicy: {{ $.Values.modelLoader.image.pullPolicy }}
          env:
            - name: MODEL_SOURCE
              value: {{ $model.source | quote }}
            - name: MODEL_DIR
              value: /models
            - name: HF_HOME
              value: /models/huggingface
          {{- if $.Values.modelLoader.hfToken }}
            - name: HF_TOKEN
              valueFrom:
                secretKeyRef:
                  name: {{ $.Release.Name }}-hf-token
                  key: token
          {{- end }}
          {{- if $.Values.customCACert.enabled }}
            - name: REQUESTS_CA_BUNDLE
              value: /ca-out/ca-certificates.crt
            - name: SSL_CERT_FILE
              value: /ca-out/ca-certificates.crt
            - name: CURL_CA_BUNDLE
              value: /ca-out/ca-certificates.crt
          {{- end }}
          volumeMounts:
            - name: model-cache
              mountPath: /models
            {{- if $.Values.customCACert.enabled }}
            - name: ca-bundle
              mountPath: /ca-out
              readOnly: true
            {{- end }}
          resources:
            requests:
              cpu: "1"
              memory: 2Gi
            limits:
              cpu: "4"
              memory: 8Gi
        {{- end }}
      {{- end }}
      containers:
        - name: vllm
          image: "{{ $.Values.image.repository }}:{{ $.Values.image.tag }}"
          imagePullPolicy: {{ $.Values.image.pullPolicy }}
          ports:
            - name: http
              containerPort: 8000
              protocol: TCP
          args:
            - "--model"
            - {{ $model.source | quote }}
            - "--host"
            - "0.0.0.0"
            - "--port"
            - "8000"
            - "--served-model-name"
            - {{ $model.name | quote }}
            {{- if gt (int $gpu) 1 }}
            - "--tensor-parallel-size"
            - {{ $gpu | quote }}
            {{- end }}
            {{- range $key, $val := $model.engineArgs }}
            - {{ $key | quote }}
            {{- if $val }}
            - {{ $val | quote }}
            {{- end }}
            {{- end }}
          env:
            - name: HF_HOME
              value: /models/huggingface
          {{- if $.Values.modelLoader.hfToken }}
            - name: HF_TOKEN
              valueFrom:
                secretKeyRef:
                  name: {{ $.Release.Name }}-hf-token
                  key: token
          {{- end }}
          {{- if $.Values.customCACert.enabled }}
            - name: REQUESTS_CA_BUNDLE
              value: /ca-out/ca-certificates.crt
            - name: SSL_CERT_FILE
              value: /ca-out/ca-certificates.crt
            - name: CURL_CA_BUNDLE
              value: /ca-out/ca-certificates.crt
          {{- end }}
          {{- range $envKey, $envVal := $model.extraEnv }}
            - name: {{ $envKey }}
              value: {{ $envVal | quote }}
          {{- end }}
          readinessProbe:
            httpGet:
              path: /health
              port: 8000
            initialDelaySeconds: {{ $.Values.readinessProbe.initialDelaySeconds }}
            periodSeconds: {{ $.Values.readinessProbe.periodSeconds }}
            timeoutSeconds: {{ $.Values.readinessProbe.timeoutSeconds }}
            failureThreshold: {{ $.Values.readinessProbe.failureThreshold }}
          livenessProbe:
            httpGet:
              path: /health
              port: 8000
            initialDelaySeconds: {{ $.Values.livenessProbe.initialDelaySeconds }}
            periodSeconds: {{ $.Values.livenessProbe.periodSeconds }}
            timeoutSeconds: {{ $.Values.livenessProbe.timeoutSeconds }}
            failureThreshold: {{ $.Values.livenessProbe.failureThreshold }}
          resources:
            requests:
              cpu: {{ $cpu | quote }}
              memory: {{ $memory }}
              {{- if gt (int $gpu) 0 }}
              nvidia.com/gpu: {{ $gpu | quote }}
              {{- end }}
            limits:
              memory: {{ $memory }}
              {{- if gt (int $gpu) 0 }}
              nvidia.com/gpu: {{ $gpu | quote }}
              {{- end }}
          volumeMounts:
            - name: model-cache
              mountPath: /models
            - name: shm
              mountPath: /dev/shm
            {{- if $.Values.customCACert.enabled }}
            - name: ca-bundle
              mountPath: /ca-out
              readOnly: true
            {{- end }}
      {{- if gt (int $gpu) 0 }}
      tolerations:
        - key: {{ $.Values.gpuToleration.key }}
          operator: {{ $.Values.gpuToleration.operator }}
          effect: {{ $.Values.gpuToleration.effect }}
      {{- end }}
      volumes:
        - name: model-cache
          {{- if and $.Values.modelCache.enabled (not $.Values.modelCache.existingClaim) }}
          persistentVolumeClaim:
            claimName: vllm-{{ $model.name }}-cache
          {{- else if $.Values.modelCache.existingClaim }}
          persistentVolumeClaim:
            claimName: {{ $.Values.modelCache.existingClaim }}
          {{- else }}
          emptyDir:
            sizeLimit: {{ $.Values.modelCache.size }}
          {{- end }}
        - name: shm
          emptyDir:
            medium: Memory
            sizeLimit: 8Gi
        {{- if $.Values.customCACert.enabled }}
        - name: custom-ca
          configMap:
            name: {{ $.Values.customCACert.configMapName }}
        - name: ca-bundle
          emptyDir: {}
        {{- end }}
{{- end }}
{{- end }}
