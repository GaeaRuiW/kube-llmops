{{- range $idx, $model := .Values.models }}
{{- if eq (default "" $model.engine) "llamacpp" }}
---
apiVersion: v1
kind: Service
metadata:
  name: llamacpp-{{ $model.name }}
  labels:
    app.kubernetes.io/name: llamacpp
    app.kubernetes.io/instance: {{ $.Release.Name }}
    app.kubernetes.io/component: model-serving
    app.kubernetes.io/part-of: kube-llmops
    kube-llmops/model: {{ $model.name }}
    kube-llmops/engine: llamacpp
spec:
  type: {{ $.Values.service.type }}
  ports:
    - port: {{ $.Values.service.port }}
      targetPort: http
      protocol: TCP
      name: http
  selector:
    app.kubernetes.io/name: llamacpp
    app.kubernetes.io/instance: {{ $.Release.Name }}
    kube-llmops/model: {{ $model.name }}
{{- end }}
{{- end }}
