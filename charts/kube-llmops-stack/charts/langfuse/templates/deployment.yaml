{{- if .Values.enabled }}
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ $.Release.Name }}-langfuse
  labels:
    app.kubernetes.io/name: langfuse
    app.kubernetes.io/instance: {{ $.Release.Name }}
    app.kubernetes.io/component: tracing
    app.kubernetes.io/part-of: kube-llmops
spec:
  replicas: {{ .Values.replicas }}
  selector:
    matchLabels:
      app.kubernetes.io/name: langfuse
      app.kubernetes.io/instance: {{ $.Release.Name }}
  template:
    metadata:
      labels:
        app.kubernetes.io/name: langfuse
        app.kubernetes.io/instance: {{ $.Release.Name }}
        app.kubernetes.io/component: tracing
        app.kubernetes.io/part-of: kube-llmops
    spec:
      containers:
        - name: langfuse
          image: "{{ .Values.image.repository }}:{{ .Values.image.tag }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          ports:
            - name: http
              containerPort: 3000
              protocol: TCP
          env:
            - name: NODE_ENV
              value: production
            - name: HOSTNAME
              value: "0.0.0.0"
            - name: NEXTAUTH_SECRET
              value: {{ .Values.auth.nextAuthSecret | quote }}
            - name: SALT
              value: {{ .Values.auth.salt | quote }}
            - name: NEXTAUTH_URL
              value: {{ .Values.externalUrl | default (printf "http://%s-langfuse:%v" $.Release.Name (.Values.service.port | int)) | quote }}
            - name: DATABASE_URL
              {{- if .Values.postgresql.enabled }}
              value: "postgresql://{{ .Values.postgresql.auth.username }}:{{ .Values.postgresql.auth.password }}@{{ $.Release.Name }}-langfuse-pg:5432/{{ .Values.postgresql.auth.database }}"
              {{- else }}
              value: "postgresql://{{ .Values.postgresql.auth.username }}:{{ .Values.postgresql.auth.password }}@{{ $.Release.Name }}-litellm-pg:5432/{{ .Values.postgresql.auth.database }}"
              {{- end }}
            - name: TELEMETRY_ENABLED
              value: "false"
            - name: ENCRYPTION_KEY
              value: {{ .Values.auth.encryptionKey | quote }}
            - name: CLICKHOUSE_URL
              value: "http://{{ $.Release.Name }}-langfuse-clickhouse:8123"
            - name: CLICKHOUSE_MIGRATION_URL
              value: "clickhouse://{{ $.Release.Name }}-langfuse-clickhouse:9000"
            - name: CLICKHOUSE_USER
              value: "default"
            - name: CLICKHOUSE_PASSWORD
              value: {{ .Values.clickhouse.password | default "clickhouse123!" | quote }}
            - name: CLICKHOUSE_CLUSTER_ENABLED
              value: "false"
            - name: REDIS_HOST
              value: "{{ $.Release.Name }}-langfuse-redis"
            - name: REDIS_PORT
              value: "6379"
            - name: REDIS_AUTH
              value: {{ .Values.redis.password | default "redis-langfuse-pw" | quote }}
            - name: LANGFUSE_S3_EVENT_UPLOAD_BUCKET
              value: {{ .Values.s3.bucket | default "langfuse" | quote }}
            - name: LANGFUSE_S3_EVENT_UPLOAD_REGION
              value: {{ .Values.s3.region | default "auto" | quote }}
            - name: LANGFUSE_S3_EVENT_UPLOAD_ACCESS_KEY_ID
              value: {{ .Values.s3.accessKeyId | default "minioadmin" | quote }}
            - name: LANGFUSE_S3_EVENT_UPLOAD_SECRET_ACCESS_KEY
              value: {{ .Values.s3.secretAccessKey | default "minioadmin" | quote }}
            - name: LANGFUSE_S3_EVENT_UPLOAD_ENDPOINT
              value: {{ .Values.s3.endpoint | default (printf "http://%s-minio:9000" $.Release.Name) | quote }}
            - name: LANGFUSE_S3_EVENT_UPLOAD_FORCE_PATH_STYLE
              value: "true"
            - name: LANGFUSE_S3_EVENT_UPLOAD_PREFIX
              value: "events/"
            - name: LANGFUSE_S3_MEDIA_UPLOAD_BUCKET
              value: {{ .Values.s3.bucket | default "langfuse" | quote }}
            - name: LANGFUSE_S3_MEDIA_UPLOAD_REGION
              value: {{ .Values.s3.region | default "auto" | quote }}
            - name: LANGFUSE_S3_MEDIA_UPLOAD_ACCESS_KEY_ID
              value: {{ .Values.s3.accessKeyId | default "minioadmin" | quote }}
            - name: LANGFUSE_S3_MEDIA_UPLOAD_SECRET_ACCESS_KEY
              value: {{ .Values.s3.secretAccessKey | default "minioadmin" | quote }}
            - name: LANGFUSE_S3_MEDIA_UPLOAD_ENDPOINT
              value: {{ .Values.s3.endpoint | default (printf "http://%s-minio:9000" $.Release.Name) | quote }}
            - name: LANGFUSE_S3_MEDIA_UPLOAD_FORCE_PATH_STYLE
              value: "true"
            - name: LANGFUSE_S3_MEDIA_UPLOAD_PREFIX
              value: "media/"
            {{- if .Values.init.enabled }}
            - name: LANGFUSE_INIT_ORG_ID
              value: {{ .Values.init.orgId | default "kube-llmops" | quote }}
            - name: LANGFUSE_INIT_ORG_NAME
              value: {{ .Values.init.orgName | default "kube-llmops" | quote }}
            - name: LANGFUSE_INIT_PROJECT_ID
              value: {{ .Values.init.projectId | default "kube-llmops" | quote }}
            - name: LANGFUSE_INIT_PROJECT_NAME
              value: {{ .Values.init.projectName | default "kube-llmops" | quote }}
            - name: LANGFUSE_INIT_PROJECT_PUBLIC_KEY
              value: {{ .Values.init.projectPublicKey | quote }}
            - name: LANGFUSE_INIT_PROJECT_SECRET_KEY
              value: {{ .Values.init.projectSecretKey | quote }}
            - name: LANGFUSE_INIT_USER_EMAIL
              value: {{ .Values.init.userEmail | default "admin@kube-llmops.local" | quote }}
            - name: LANGFUSE_INIT_USER_NAME
              value: {{ .Values.init.userName | default "admin" | quote }}
            - name: LANGFUSE_INIT_USER_PASSWORD
              value: {{ .Values.init.userPassword | default "admin" | quote }}
            {{- end }}
            {{- if .Values.oidc.enabled }}
            - name: AUTH_KEYCLOAK_CLIENT_ID
              value: {{ .Values.oidc.clientId | quote }}
            - name: AUTH_KEYCLOAK_CLIENT_SECRET
              value: {{ .Values.oidc.clientSecret | quote }}
            - name: AUTH_KEYCLOAK_ISSUER
              value: {{ .Values.oidc.issuerUrl | quote }}
            - name: AUTH_KEYCLOAK_ALLOW_ACCOUNT_LINKING
              value: "true"
            {{- end }}
          readinessProbe:
            httpGet:
              path: {{ .Values.readinessProbe.httpGet.path }}
              port: 3000
            initialDelaySeconds: {{ .Values.readinessProbe.initialDelaySeconds }}
            periodSeconds: {{ .Values.readinessProbe.periodSeconds }}
            timeoutSeconds: {{ .Values.readinessProbe.timeoutSeconds }}
            failureThreshold: {{ .Values.readinessProbe.failureThreshold }}
          livenessProbe:
            httpGet:
              path: {{ .Values.livenessProbe.httpGet.path }}
              port: 3000
            initialDelaySeconds: {{ .Values.livenessProbe.initialDelaySeconds }}
            periodSeconds: {{ .Values.livenessProbe.periodSeconds }}
            timeoutSeconds: {{ .Values.livenessProbe.timeoutSeconds }}
            failureThreshold: {{ .Values.livenessProbe.failureThreshold }}
          resources:
            requests:
              cpu: {{ .Values.resources.requests.cpu }}
              memory: {{ .Values.resources.requests.memory }}
            limits:
              cpu: {{ .Values.resources.limits.cpu | quote }}
              memory: {{ .Values.resources.limits.memory }}
---
apiVersion: v1
kind: Service
metadata:
  name: {{ $.Release.Name }}-langfuse
  labels:
    app.kubernetes.io/name: langfuse
    app.kubernetes.io/instance: {{ $.Release.Name }}
    app.kubernetes.io/component: tracing
    app.kubernetes.io/part-of: kube-llmops
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: http
      name: http
  selector:
    app.kubernetes.io/name: langfuse
    app.kubernetes.io/instance: {{ $.Release.Name }}
{{- end }}
