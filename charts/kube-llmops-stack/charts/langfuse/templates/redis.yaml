{{- if .Values.enabled }}
---
# Redis for Langfuse v3 async worker queue
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ .Release.Name }}-langfuse-redis
  labels:
    app.kubernetes.io/name: langfuse-redis
    app.kubernetes.io/instance: {{ .Release.Name }}
    app.kubernetes.io/component: tracing
    app.kubernetes.io/part-of: kube-llmops
spec:
  replicas: 1
  strategy:
    type: Recreate
  selector:
    matchLabels:
      app.kubernetes.io/name: langfuse-redis
      app.kubernetes.io/instance: {{ .Release.Name }}
  template:
    metadata:
      labels:
        app.kubernetes.io/name: langfuse-redis
        app.kubernetes.io/instance: {{ .Release.Name }}
        app.kubernetes.io/component: tracing
        app.kubernetes.io/part-of: kube-llmops
    spec:
      containers:
        - name: redis
          image: "{{ .Values.redis.image.repository }}:{{ .Values.redis.image.tag }}"
          imagePullPolicy: {{ .Values.redis.image.pullPolicy }}
          command:
            - redis-server
            - --requirepass
            - {{ .Values.redis.password | default "redis-langfuse-pw" | quote }}
            - --maxmemory-policy
            - noeviction
          ports:
            - name: redis
              containerPort: 6379
          readinessProbe:
            exec:
              command: ["redis-cli", "ping"]
            initialDelaySeconds: 5
            periodSeconds: 10
          resources:
            {{- toYaml .Values.redis.resources | nindent 12 }}
---
apiVersion: v1
kind: Service
metadata:
  name: {{ .Release.Name }}-langfuse-redis
  labels:
    app.kubernetes.io/name: langfuse-redis
    app.kubernetes.io/instance: {{ .Release.Name }}
    app.kubernetes.io/part-of: kube-llmops
spec:
  type: ClusterIP
  ports:
    - name: redis
      port: 6379
      targetPort: redis
  selector:
    app.kubernetes.io/name: langfuse-redis
    app.kubernetes.io/instance: {{ .Release.Name }}
{{- end }}
