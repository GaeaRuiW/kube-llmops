enabled: false

image:
  repository: langfuse/langfuse
  # Pin to v2 — v3 requires ClickHouse which we don't deploy
  tag: "2.95.11"
  pullPolicy: IfNotPresent

replicas: 1

# External URL for NextAuth redirects (set when using port-forward or ingress)
# Example: http://localhost:3001 or https://langfuse.example.com
externalUrl: ""

service:
  type: ClusterIP
  port: 3000

# Langfuse needs its own database (can share PG instance but separate DB)
postgresql:
  # When false, reuse LiteLLM's PostgreSQL by creating a DB in the same instance
  enabled: false
  auth:
    database: langfuse
    username: langfuse
    password: langfuse-default-pw

# Langfuse auth
auth:
  nextAuthSecret: kube-llmops-langfuse-secret
  salt: kube-llmops-langfuse-salt

# Auto-provisioning: creates org, project, user, and API keys on first startup
# API keys (projectPublicKey/projectSecretKey) must match LiteLLM's langfusePublicKey/langfuseSecretKey
init:
  enabled: true
  orgId: kube-llmops
  orgName: kube-llmops
  projectId: kube-llmops
  projectName: kube-llmops
  projectPublicKey: pk-lf-kube-llmops
  projectSecretKey: sk-lf-kube-llmops
  userEmail: admin@kube-llmops.local
  userName: admin
  userPassword: admin123!

resources:
  requests:
    cpu: 250m
    memory: 256Mi
  limits:
    cpu: "1"
    memory: 1Gi

readinessProbe:
  httpGet:
    path: /api/public/health
    port: 3000
  initialDelaySeconds: 15
  periodSeconds: 10
  timeoutSeconds: 5
  failureThreshold: 10

livenessProbe:
  httpGet:
    path: /api/public/health
    port: 3000
  initialDelaySeconds: 30
  periodSeconds: 30
  timeoutSeconds: 5
  failureThreshold: 3
