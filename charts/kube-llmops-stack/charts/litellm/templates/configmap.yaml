{{/*
Generate LiteLLM config from models list.
Maps each model to its internal vLLM/llamacpp/TEI service endpoint.
*/}}
apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ $.Release.Name }}-litellm-config
  labels:
    app.kubernetes.io/name: litellm
    app.kubernetes.io/instance: {{ $.Release.Name }}
    app.kubernetes.io/part-of: kube-llmops
data:
  config.yaml: |
    model_list:
    {{- range $idx, $model := .Values.models }}
      {{- $engine := default "vllm" $model.engine }}
      {{- $port := "8000" }}
      {{- $prefix := "vllm" }}
      {{- if eq $engine "llamacpp" }}
        {{- $port = "8080" }}
        {{- $prefix = "llamacpp" }}
      {{- else if eq $engine "tei" }}
        {{- $port = "8080" }}
        {{- $prefix = "tei" }}
      {{- end }}
      - model_name: {{ $model.name }}
        litellm_params:
          {{- if eq $engine "tei" }}
          model: huggingface/{{ $model.source }}
          {{- else }}
          model: openai/{{ $model.name }}
          {{- end }}
          api_base: http://{{ $prefix }}-{{ $model.name }}.{{ $.Release.Namespace }}.svc.cluster.local:{{ $port }}/v1
          {{- if ne $engine "tei" }}
          api_key: "no-key-needed"
          {{- end }}
    {{- end }}
    {{- range $idx, $emb := .Values.embeddingModels }}
      - model_name: {{ $emb.name }}
        litellm_params:
          model: openai/{{ $emb.name }}
          api_base: {{ $emb.apiBase }}
          api_key: {{ $emb.apiKey | default "no-key-needed" | quote }}
    {{- end }}

    {{- if .Values.models }}
    router_settings:
      routing_strategy: simple-shuffle
      num_retries: {{ .Values.routerSettings.numRetries | default 3 }}
      timeout: {{ .Values.routerSettings.timeout | default 120 }}
      {{- if .Values.routerSettings.fallbacks }}
      fallbacks: {{ .Values.routerSettings.fallbacks | toJson }}
      {{- end }}
      allowed_fails: {{ .Values.routerSettings.allowedFails | default 3 }}
      cooldown_time: {{ .Values.routerSettings.cooldownTime | default 60 }}
    {{- end }}

    general_settings:
      master_key: {{ .Values.masterKey | default "sk-kube-llmops-default" }}
      {{- if .Values.postgresql.enabled }}
      database_url: postgresql://{{ .Values.postgresql.auth.username }}:{{ .Values.postgresql.auth.password }}@{{ $.Release.Name }}-litellm-pg:{{ .Values.postgresql.service.port }}/{{ .Values.postgresql.auth.database }}
      {{- end }}
      {{- if .Values.rateLimiting.enabled }}
      global_max_parallel_requests: {{ .Values.rateLimiting.globalMaxParallelRequests | default 100 }}
      max_request_size_mb: {{ .Values.rateLimiting.maxRequestSizeMb | default 10 }}
      {{- end }}
      {{- if .Values.sso.enabled }}
      enable_jwt_auth: true
      litellm_jwtauth:
        admin_jwt_scope: "litellm_admin"
        user_id_jwt_field: "preferred_username"
      {{- end }}

    {{- if .Values.langfuseEnabled }}
    litellm_settings:
      success_callback: ["langfuse"]
      failure_callback: ["langfuse"]
      {{- if .Values.rateLimiting.enabled }}
      max_budget: {{ .Values.rateLimiting.maxBudget | default 100.0 }}
      budget_duration: {{ .Values.rateLimiting.budgetDuration | default "30d" | quote }}
      {{- end }}
    {{- else }}
      {{- if .Values.rateLimiting.enabled }}
    litellm_settings:
      max_budget: {{ .Values.rateLimiting.maxBudget | default 100.0 }}
      budget_duration: {{ .Values.rateLimiting.budgetDuration | default "30d" | quote }}
      {{- end }}
    {{- end }}
