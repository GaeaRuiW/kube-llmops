{{- if .Values.postgresql.enabled }}
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: {{ $.Release.Name }}-litellm-pg-data
  labels:
    app.kubernetes.io/name: litellm-postgresql
    app.kubernetes.io/instance: {{ $.Release.Name }}
    app.kubernetes.io/part-of: kube-llmops
spec:
  accessModes:
    - ReadWriteOnce
  {{- if .Values.postgresql.storage.storageClass }}
  storageClassName: {{ .Values.postgresql.storage.storageClass }}
  {{- end }}
  resources:
    requests:
      storage: {{ .Values.postgresql.storage.size }}
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ $.Release.Name }}-litellm-pg
  labels:
    app.kubernetes.io/name: litellm-postgresql
    app.kubernetes.io/instance: {{ $.Release.Name }}
    app.kubernetes.io/component: database
    app.kubernetes.io/part-of: kube-llmops
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: litellm-postgresql
      app.kubernetes.io/instance: {{ $.Release.Name }}
  template:
    metadata:
      labels:
        app.kubernetes.io/name: litellm-postgresql
        app.kubernetes.io/instance: {{ $.Release.Name }}
        app.kubernetes.io/component: database
        app.kubernetes.io/part-of: kube-llmops
    spec:
      containers:
        - name: postgresql
          image: "{{ .Values.postgresql.image.repository }}:{{ .Values.postgresql.image.tag }}"
          ports:
            - containerPort: 5432
          env:
            - name: POSTGRES_DB
              value: {{ .Values.postgresql.auth.database }}
            - name: POSTGRES_USER
              value: {{ .Values.postgresql.auth.username }}
            - name: POSTGRES_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: {{ $.Release.Name }}-litellm-pg-secret
                  key: password
            - name: PGDATA
              value: /var/lib/postgresql/data/pgdata
          readinessProbe:
            exec:
              command: ["pg_isready", "-U", {{ .Values.postgresql.auth.username | quote }}]
            initialDelaySeconds: 5
            periodSeconds: 5
          volumeMounts:
            - name: pg-data
              mountPath: /var/lib/postgresql/data
          resources:
            requests:
              cpu: 250m
              memory: 256Mi
            limits:
              cpu: "1"
              memory: 512Mi
      volumes:
        - name: pg-data
          persistentVolumeClaim:
            claimName: {{ $.Release.Name }}-litellm-pg-data
---
apiVersion: v1
kind: Service
metadata:
  name: {{ $.Release.Name }}-litellm-pg
  labels:
    app.kubernetes.io/name: litellm-postgresql
    app.kubernetes.io/instance: {{ $.Release.Name }}
    app.kubernetes.io/part-of: kube-llmops
spec:
  type: ClusterIP
  ports:
    - port: {{ .Values.postgresql.service.port }}
      targetPort: 5432
      name: postgresql
  selector:
    app.kubernetes.io/name: litellm-postgresql
    app.kubernetes.io/instance: {{ $.Release.Name }}
---
apiVersion: v1
kind: Secret
metadata:
  name: {{ $.Release.Name }}-litellm-pg-secret
  labels:
    app.kubernetes.io/name: litellm-postgresql
    app.kubernetes.io/instance: {{ $.Release.Name }}
    app.kubernetes.io/part-of: kube-llmops
type: Opaque
data:
  password: {{ .Values.postgresql.auth.password | b64enc | quote }}
{{- end }}
