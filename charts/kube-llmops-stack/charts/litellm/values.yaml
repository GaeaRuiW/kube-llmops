enabled: true

models: []

# Langfuse integration (set by parent chart when langfuse is enabled)
langfuseEnabled: false
langfusePublicKey: ""
langfuseSecretKey: ""

# Router settings (load balancing, fallback, retries)
routerSettings:
  numRetries: 3
  timeout: 120
  allowedFails: 3         # Failures before marking deployment unhealthy
  cooldownTime: 60        # Seconds to cooldown unhealthy deployment
  # fallbacks:            # Model fallback chain, e.g.:
  #   - model-a: [model-b]

# Rate limiting and budget control
rateLimiting:
  enabled: false
  globalMaxParallelRequests: 100
  maxRequestSizeMb: 10
  maxBudget: 100.0        # Max spend in USD (tracked via LiteLLM cost API)
  budgetDuration: "30d"   # Budget reset period

image:
  repository: ghcr.io/berriai/litellm
  tag: main-stable
  pullPolicy: IfNotPresent

replicas: 1

masterKey: ""

service:
  type: ClusterIP
  port: 4000

postgresql:
  enabled: true
  image:
    repository: postgres
    tag: "16-alpine"
  auth:
    database: litellm
    username: litellm
    password: litellm-default-pw
  storage:
    size: 5Gi
    storageClass: ""
  service:
    port: 5432

readinessProbe:
  httpGet:
    path: /health/liveliness
    port: 4000
  initialDelaySeconds: 15
  periodSeconds: 10
  timeoutSeconds: 5
  failureThreshold: 10

livenessProbe:
  httpGet:
    path: /health/liveliness
    port: 4000
  initialDelaySeconds: 30
  periodSeconds: 30
  timeoutSeconds: 5
  failureThreshold: 3

resources:
  requests:
    cpu: 500m
    memory: 512Mi
  limits:
    cpu: "2"
    memory: 1Gi
