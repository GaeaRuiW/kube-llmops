enabled: true

models: []

image:
  repository: ghcr.io/berriai/litellm
  tag: main-stable
  pullPolicy: IfNotPresent

replicas: 1

masterKey: ""

service:
  type: ClusterIP
  port: 4000

postgresql:
  enabled: true
  image:
    repository: postgres
    tag: "16-alpine"
  auth:
    database: litellm
    username: litellm
    password: litellm-default-pw
  storage:
    size: 5Gi
    storageClass: ""
  service:
    port: 5432

readinessProbe:
  httpGet:
    path: /health/liveliness
    port: 4000
  initialDelaySeconds: 15
  periodSeconds: 10
  timeoutSeconds: 5
  failureThreshold: 10

livenessProbe:
  httpGet:
    path: /health/liveliness
    port: 4000
  initialDelaySeconds: 30
  periodSeconds: 30
  timeoutSeconds: 5
  failureThreshold: 3

resources:
  requests:
    cpu: 500m
    memory: 512Mi
  limits:
    cpu: "2"
    memory: 1Gi
