  #     cpuQuota: 32
  #     maxPods: 40

# Envoy AI Gateway (Tier 2 — advanced routing, LoRA adapter support)
# Requires: Gateway API CRDs + Envoy Gateway controller pre-installed
envoyGateway:
  enabled: false
  port: 8888
