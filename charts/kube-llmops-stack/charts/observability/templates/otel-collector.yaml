{{- if .Values.otelCollector.enabled }}
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ $.Release.Name }}-otel-config
  labels:
    app.kubernetes.io/name: otel-collector
    app.kubernetes.io/instance: {{ $.Release.Name }}
    app.kubernetes.io/part-of: kube-llmops
data:
  config.yaml: |
    receivers:
      otlp:
        protocols:
          grpc:
            endpoint: 0.0.0.0:4317
          http:
            endpoint: 0.0.0.0:4318
      prometheus:
        config:
          scrape_configs:
            - job_name: vllm
              scrape_interval: 15s
              kubernetes_sd_configs:
                - role: pod
              relabel_configs:
                - source_labels: [__meta_kubernetes_pod_label_kube_llmops_engine]
                  regex: vllm
                  action: keep
                - source_labels: [__meta_kubernetes_pod_ip]
                  target_label: __address__
                  replacement: $1:8000
            - job_name: dcgm-exporter
              scrape_interval: 15s
              kubernetes_sd_configs:
                - role: pod
              relabel_configs:
                - source_labels: [__meta_kubernetes_pod_label_app_kubernetes_io_name]
                  regex: dcgm-exporter
                  action: keep
                - source_labels: [__meta_kubernetes_pod_ip]
                  target_label: __address__
                  replacement: $1:9400
    processors:
      batch:
        timeout: 5s
        send_batch_size: 1024
    exporters:
      prometheusremotewrite:
        endpoint: http://{{ $.Release.Name }}-prometheus:9090/api/v1/write
        resource_to_telemetry_conversion:
          enabled: true
      debug:
        verbosity: basic
    service:
      pipelines:
        metrics:
          receivers: [otlp, prometheus]
          processors: [batch]
          exporters: [prometheusremotewrite]
        traces:
          receivers: [otlp]
          processors: [batch]
          exporters: [debug]
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ $.Release.Name }}-otel-collector
  labels:
    app.kubernetes.io/name: otel-collector
    app.kubernetes.io/instance: {{ $.Release.Name }}
    app.kubernetes.io/component: observability
    app.kubernetes.io/part-of: kube-llmops
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: otel-collector
      app.kubernetes.io/instance: {{ $.Release.Name }}
  template:
    metadata:
      labels:
        app.kubernetes.io/name: otel-collector
        app.kubernetes.io/instance: {{ $.Release.Name }}
        app.kubernetes.io/component: observability
        app.kubernetes.io/part-of: kube-llmops
      annotations:
        checksum/config: "{{ toYaml .Values.otelCollector | sha256sum }}"
    spec:
      serviceAccountName: {{ $.Release.Name }}-otel-collector
      containers:
        - name: otel-collector
          image: "{{ .Values.otelCollector.image.repository }}:{{ .Values.otelCollector.image.tag }}"
          imagePullPolicy: {{ .Values.otelCollector.image.pullPolicy }}
          args: ["--config=/etc/otel/config.yaml"]
          ports:
            - containerPort: 4317
              name: otlp-grpc
            - containerPort: 4318
              name: otlp-http
          resources:
            requests:
              cpu: {{ .Values.otelCollector.resources.requests.cpu }}
              memory: {{ .Values.otelCollector.resources.requests.memory }}
            limits:
              cpu: {{ .Values.otelCollector.resources.limits.cpu | quote }}
              memory: {{ .Values.otelCollector.resources.limits.memory }}
          volumeMounts:
            - name: config
              mountPath: /etc/otel/config.yaml
              subPath: config.yaml
      volumes:
        - name: config
          configMap:
            name: {{ $.Release.Name }}-otel-config
---
apiVersion: v1
kind: Service
metadata:
  name: {{ $.Release.Name }}-otel-collector
  labels:
    app.kubernetes.io/name: otel-collector
    app.kubernetes.io/instance: {{ $.Release.Name }}
    app.kubernetes.io/part-of: kube-llmops
spec:
  type: ClusterIP
  ports:
    - port: 4317
      targetPort: otlp-grpc
      name: otlp-grpc
    - port: 4318
      targetPort: otlp-http
      name: otlp-http
  selector:
    app.kubernetes.io/name: otel-collector
    app.kubernetes.io/instance: {{ $.Release.Name }}
---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: {{ $.Release.Name }}-otel-collector
  labels:
    app.kubernetes.io/name: otel-collector
    app.kubernetes.io/instance: {{ $.Release.Name }}
    app.kubernetes.io/part-of: kube-llmops
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: {{ $.Release.Name }}-otel-collector
rules:
  - apiGroups: [""]
    resources: ["pods", "nodes"]
    verbs: ["get", "list", "watch"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: {{ $.Release.Name }}-otel-collector
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: {{ $.Release.Name }}-otel-collector
subjects:
  - kind: ServiceAccount
    name: {{ $.Release.Name }}-otel-collector
    namespace: {{ $.Release.Namespace }}
{{- end }}
