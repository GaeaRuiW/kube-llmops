{{- if .Values.dcgmExporter.enabled }}
---
apiVersion: apps/v1
kind: DaemonSet
metadata:
  name: {{ $.Release.Name }}-dcgm-exporter
  labels:
    app.kubernetes.io/name: dcgm-exporter
    app.kubernetes.io/instance: {{ $.Release.Name }}
    app.kubernetes.io/component: observability
    app.kubernetes.io/part-of: kube-llmops
spec:
  selector:
    matchLabels:
      app.kubernetes.io/name: dcgm-exporter
      app.kubernetes.io/instance: {{ $.Release.Name }}
  template:
    metadata:
      labels:
        app.kubernetes.io/name: dcgm-exporter
        app.kubernetes.io/instance: {{ $.Release.Name }}
        app.kubernetes.io/component: observability
        app.kubernetes.io/part-of: kube-llmops
    spec:
      containers:
        - name: dcgm-exporter
          image: "{{ .Values.dcgmExporter.image.repository }}:{{ .Values.dcgmExporter.image.tag }}"
          imagePullPolicy: {{ .Values.dcgmExporter.image.pullPolicy }}
          ports:
            - containerPort: 9400
              name: metrics
          securityContext:
            runAsNonRoot: false
            runAsUser: 0
          volumeMounts:
            - name: dev
              mountPath: /dev
          resources:
            requests:
              cpu: 100m
              memory: 128Mi
            limits:
              cpu: 500m
              memory: 256Mi
      tolerations:
        - key: nvidia.com/gpu
          operator: Exists
          effect: NoSchedule
      volumes:
        - name: dev
          hostPath:
            path: /dev
{{- end }}
