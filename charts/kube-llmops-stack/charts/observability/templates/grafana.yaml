{{- if .Values.grafana.enabled }}
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: {{ $.Release.Name }}-grafana-data
  labels:
    app.kubernetes.io/name: grafana
    app.kubernetes.io/instance: {{ $.Release.Name }}
    app.kubernetes.io/part-of: kube-llmops
spec:
  accessModes:
    - ReadWriteOnce
  {{- if .Values.grafana.storage.storageClass }}
  storageClassName: {{ .Values.grafana.storage.storageClass }}
  {{- end }}
  resources:
    requests:
      storage: {{ .Values.grafana.storage.size }}
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ $.Release.Name }}-grafana-datasources
  labels:
    app.kubernetes.io/name: grafana
    app.kubernetes.io/instance: {{ $.Release.Name }}
    app.kubernetes.io/part-of: kube-llmops
data:
  datasources.yaml: |
    apiVersion: 1
    datasources:
      - name: Prometheus
        type: prometheus
        access: proxy
        url: http://{{ $.Release.Name }}-prometheus:9090
        isDefault: true
        editable: false
      - name: Loki
        type: loki
        access: proxy
        url: http://{{ $.Release.Name }}-loki:3100
        editable: false
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ $.Release.Name }}-grafana
  labels:
    app.kubernetes.io/name: grafana
    app.kubernetes.io/instance: {{ $.Release.Name }}
    app.kubernetes.io/component: observability
    app.kubernetes.io/part-of: kube-llmops
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: grafana
      app.kubernetes.io/instance: {{ $.Release.Name }}
  template:
    metadata:
      labels:
        app.kubernetes.io/name: grafana
        app.kubernetes.io/instance: {{ $.Release.Name }}
        app.kubernetes.io/component: observability
        app.kubernetes.io/part-of: kube-llmops
    spec:
      securityContext:
        fsGroup: 472
        runAsUser: 472
      containers:
        - name: grafana
          image: "{{ .Values.grafana.image.repository }}:{{ .Values.grafana.image.tag }}"
          imagePullPolicy: {{ .Values.grafana.image.pullPolicy }}
          ports:
            - containerPort: 3000
              name: http
          env:
            - name: GF_SECURITY_ADMIN_PASSWORD
              value: {{ .Values.grafana.adminPassword | default "admin" | quote }}
            - name: GF_INSTALL_PLUGINS
              value: ""
            {{- if .Values.grafana.oidc.enabled }}
            - name: GF_AUTH_GENERIC_OAUTH_ENABLED
              value: "true"
            - name: GF_AUTH_GENERIC_OAUTH_NAME
              value: {{ .Values.grafana.oidc.name | default "Keycloak" | quote }}
            - name: GF_AUTH_GENERIC_OAUTH_CLIENT_ID
              value: {{ .Values.grafana.oidc.clientId | quote }}
            - name: GF_AUTH_GENERIC_OAUTH_CLIENT_SECRET
              value: {{ .Values.grafana.oidc.clientSecret | quote }}
            - name: GF_AUTH_GENERIC_OAUTH_SCOPES
              value: "openid profile email"
            - name: GF_AUTH_GENERIC_OAUTH_AUTH_URL
              value: "{{ .Values.grafana.oidc.issuerUrl }}/protocol/openid-connect/auth"
            - name: GF_AUTH_GENERIC_OAUTH_TOKEN_URL
              value: "{{ .Values.grafana.oidc.internalIssuerUrl | default .Values.grafana.oidc.issuerUrl }}/protocol/openid-connect/token"
            - name: GF_AUTH_GENERIC_OAUTH_API_URL
              value: "{{ .Values.grafana.oidc.internalIssuerUrl | default .Values.grafana.oidc.issuerUrl }}/protocol/openid-connect/userinfo"
            - name: GF_AUTH_GENERIC_OAUTH_ROLE_ATTRIBUTE_PATH
              value: {{ .Values.grafana.oidc.roleAttributePath | default "contains(realm_access.roles[*], 'admin') && 'Admin' || 'Viewer'" | quote }}
            - name: GF_SERVER_ROOT_URL
              value: {{ .Values.grafana.oidc.grafanaRootUrl | default "http://localhost:3000" | quote }}
            {{- end }}
          readinessProbe:
            httpGet:
              path: /api/health
              port: 3000
            initialDelaySeconds: 10
            periodSeconds: 10
          resources:
            requests:
              cpu: {{ .Values.grafana.resources.requests.cpu }}
              memory: {{ .Values.grafana.resources.requests.memory }}
            limits:
              cpu: {{ .Values.grafana.resources.limits.cpu }}
              memory: {{ .Values.grafana.resources.limits.memory }}
          volumeMounts:
            - name: data
              mountPath: /var/lib/grafana
            - name: datasources
              mountPath: /etc/grafana/provisioning/datasources/datasources.yaml
              subPath: datasources.yaml
            - name: dashboards-provision
              mountPath: /etc/grafana/provisioning/dashboards/dashboards.yaml
              subPath: dashboards.yaml
            - name: dashboards-json
              mountPath: /etc/grafana/dashboards
      volumes:
        - name: data
          persistentVolumeClaim:
            claimName: {{ $.Release.Name }}-grafana-data
        - name: datasources
          configMap:
            name: {{ $.Release.Name }}-grafana-datasources
        - name: dashboards-provision
          configMap:
            name: {{ $.Release.Name }}-grafana-dashboard-provision
        - name: dashboards-json
          configMap:
            name: {{ $.Release.Name }}-grafana-dashboards
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ $.Release.Name }}-grafana-dashboard-provision
  labels:
    app.kubernetes.io/name: grafana
    app.kubernetes.io/instance: {{ $.Release.Name }}
    app.kubernetes.io/part-of: kube-llmops
data:
  dashboards.yaml: |
    apiVersion: 1
    providers:
      - name: kube-llmops
        orgId: 1
        folder: kube-llmops
        type: file
        disableDeletion: false
        editable: true
        options:
          path: /etc/grafana/dashboards
          foldersFromFilesStructure: false
---
apiVersion: v1
kind: Service
metadata:
  name: {{ $.Release.Name }}-grafana
  labels:
    app.kubernetes.io/name: grafana
    app.kubernetes.io/instance: {{ $.Release.Name }}
    app.kubernetes.io/part-of: kube-llmops
spec:
  type: {{ .Values.grafana.service.type }}
  ports:
    - port: {{ .Values.grafana.service.port }}
      targetPort: http
      name: http
  selector:
    app.kubernetes.io/name: grafana
    app.kubernetes.io/instance: {{ $.Release.Name }}
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ $.Release.Name }}-grafana-dashboards
  labels:
    app.kubernetes.io/name: grafana
    app.kubernetes.io/instance: {{ $.Release.Name }}
    app.kubernetes.io/part-of: kube-llmops
data:
  {{- (.Files.Glob "dashboards/*.json").AsConfig | nindent 2 }}
{{- end }}
