# Single-node deployment — core features + SSO + observability
# Usage: 
#   helm install kube-llmops charts/kube-llmops-stack -f values-single-node.yaml
#   ./scripts/init-keycloak.sh
#
# After install, add to /etc/hosts:
#   <NODE_IP> litellm.llmops.local grafana.llmops.local langfuse.llmops.local keycloak.llmops.local prometheus.llmops.local

# ========== Ingress ==========
ingress:
  enabled: true
  className: traefik
  host: llmops.local

# ========== Model Serving ==========
vllm:
  enabled: true
  modelLoader:
    enabled: false
  models:
    - name: qwen2-5-0-5b
      source: Qwen/Qwen2.5-0.5B-Instruct
      engine: vllm
      replicas: 1
      resources:
        gpu: 1
        memory: 8Gi
      engineArgs:
        --gpu-memory-utilization: "0.8"
        --max-model-len: "4096"
        --enforce-eager: ""
        --attention-backend: TRITON_ATTN

llamacpp:
  enabled: true
  models: []

tei:
  enabled: true
  models: []

# ========== AI Gateway ==========
litellm:
  enabled: true
  masterKey: sk-kube-llmops-dev
  langfuseEnabled: true
  langfusePublicKey: "pk-lf-kube-llmops"
  langfuseSecretKey: "sk-lf-kube-llmops"
  rateLimiting:
    enabled: true
  models:
    - name: qwen2-5-0-5b
      source: Qwen/Qwen2.5-0.5B-Instruct
      engine: vllm
  postgresql:
    enabled: true
    auth:
      username: litellm
      password: llmops-pg-dev-pw
      database: litellm
    extraDatabases:
      - name: langfuse
        password: langfuse-default-pw

# ========== Observability ==========
observability:
  enabled: true
  dcgmExporter:
    enabled: true               # GPU metrics; disable only on WSL2
  prometheus:
    enabled: true
    storage:
      size: 5Gi
  grafana:
    enabled: true
    adminPassword: admin123!
    storage:
      size: 2Gi
    oidc:
      enabled: true
      clientId: grafana
      clientSecret: grafana-oidc-secret
      issuerUrl: http://keycloak.llmops.local/realms/kube-llmops
      grafanaRootUrl: http://grafana.llmops.local

# ========== Langfuse ==========
langfuse:
  enabled: true
  externalUrl: "http://langfuse.llmops.local"
  oidc:
    enabled: true
    clientId: langfuse
    clientSecret: langfuse-oidc-secret
    issuerUrl: http://keycloak.llmops.local/realms/kube-llmops
  postgresql:
    enabled: false
    auth:
      database: langfuse
      username: langfuse
      password: langfuse-default-pw

# ========== Keycloak (SSO) ==========
keycloak:
  enabled: true

# ========== Logging ==========
logging:
  enabled: true
  loki:
    storage:
      size: 2Gi

# ========== Disabled ==========
keda:
  enabled: false                # Single node, no scale target
dify:
  enabled: false                # Enable when RAG is ready
security:
  enabled: false
harbor:
  enabled: false
milvus:
  enabled: false

# ========== MinIO (Model Storage) ==========
fluid:
  enabled: true
  minio:
    enabled: true
    storage:
      size: 50Gi
