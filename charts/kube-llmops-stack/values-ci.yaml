# CI profile: CPU-only, tiny model, for E2E testing on kind (no GPU required)
# Usage: helm install kube-llmops charts/kube-llmops-stack -f charts/kube-llmops-stack/values-ci.yaml

global:
  gpu: false

models:
  - name: tiny-model
    source: hf-internal-testing/tiny-random-LlamaForCausalLM
    engine: vllm
    replicas: 1
    resources:
      gpu: 0
      cpu: 2
      memory: 4Gi
    engineArgs:
      --device: cpu
      --dtype: float32

vllm:
  enabled: true
  models:
    - name: tiny-model
      source: hf-internal-testing/tiny-random-LlamaForCausalLM
      engine: vllm
      replicas: 1
      resources:
        gpu: 0
        cpu: 2
        memory: 4Gi
      engineArgs:
        --device: cpu
        --dtype: float32
  modelLoader:
    enabled: false
  modelCache:
    enabled: false

llamacpp:
  enabled: true
  models: []

tei:
  enabled: true
  models: []

litellm:
  enabled: true
  masterKey: sk-ci-test-key
  models:
    - name: tiny-model
      source: hf-internal-testing/tiny-random-LlamaForCausalLM
      engine: vllm
  postgresql:
    auth:
      password: ci-pg-password

observability:
  enabled: false
  dcgmExporter:
    enabled: false

langfuse:
  enabled: false

logging:
  enabled: false

keda:
  enabled: false

fluid:
  enabled: false

harbor:
  enabled: false

keycloak:
  enabled: false

milvus:
  enabled: false

minio:
  enabled: false
