{{/*
Ingress for all kube-llmops services.

Mode 1 — With domain (recommended):
  Set ingress.host=llm.example.com
  Services accessible at:
    litellm.llm.example.com
    grafana.llm.example.com
    langfuse.llm.example.com
    dify.llm.example.com

Mode 2 — Without domain (IP only):
  Set ingress.host="" and ingress.ipMode=true
  Each service gets a unique port via NodePort.
  See Helm NOTES.txt for the assigned ports.
*/}}
{{- if .Values.ingress.enabled }}
{{- $host := .Values.ingress.host }}
{{- $className := .Values.ingress.className | default "traefik" }}

{{/* ========== LiteLLM ========== */}}
---
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: {{ .Release.Name }}-litellm-ingress
  labels:
    app.kubernetes.io/part-of: kube-llmops
  annotations:
    {{- with .Values.ingress.annotations }}
    {{- toYaml . | nindent 4 }}
    {{- end }}
spec:
  ingressClassName: {{ $className }}
  {{- if and .Values.ingress.tls $host }}
  tls:
    - hosts:
        - {{ if $host }}litellm.{{ $host }}{{ else }}*{{ end }}
      secretName: {{ .Release.Name }}-litellm-tls
  {{- end }}
  rules:
    - {{- if $host }}
      host: litellm.{{ $host }}
      {{- end }}
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: {{ .Release.Name }}-litellm
                port:
                  number: 4000

{{- if index .Values "observability" "enabled" }}
