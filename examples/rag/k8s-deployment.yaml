apiVersion: apps/v1
kind: Deployment
metadata:
  name: rag-example
  labels:
    app.kubernetes.io/name: rag-example
    app.kubernetes.io/part-of: kube-llmops
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: rag-example
  template:
    metadata:
      labels:
        app.kubernetes.io/name: rag-example
        app.kubernetes.io/part-of: kube-llmops
    spec:
      containers:
        - name: rag
          image: python:3.12-slim
          command: ["bash", "-c"]
          args:
            - |
              pip install -q fastapi uvicorn psycopg2-binary pgvector openai langfuse sentence-transformers
              cd /app && python app.py
          ports:
            - containerPort: 8000
          env:
            - name: DATABASE_URL
              value: "postgresql://litellm:llmops-pg-dev-pw@kube-llmops-litellm-pg:5432/litellm"
            - name: LITELLM_URL
              value: "http://kube-llmops-litellm:4000"
            - name: LITELLM_KEY
              value: "sk-kube-llmops-dev"
            - name: LANGFUSE_HOST
              value: "http://kube-llmops-langfuse:3000"
            - name: LANGFUSE_PUBLIC_KEY
              value: "pk-lf-kube-llmops"
            - name: LANGFUSE_SECRET_KEY
              value: "sk-lf-kube-llmops"
          resources:
            requests:
              cpu: 500m
              memory: 1Gi
            limits:
              cpu: "2"
              memory: 2Gi
          volumeMounts:
            - name: app
              mountPath: /app
      volumes:
        - name: app
          configMap:
            name: rag-example-code
---
apiVersion: v1
kind: Service
metadata:
  name: rag-example
spec:
  type: ClusterIP
  ports:
    - port: 8000
      targetPort: 8000
  selector:
    app.kubernetes.io/name: rag-example
