name: Build

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

jobs:
  helm-package:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Helm
        uses: azure/setup-helm@v4
        with:
          version: v3.16.0

      - name: Helm package
        run: |
          mkdir -p dist
          helm package charts/kube-llmops-stack/ -d dist/

      - name: Upload chart artifact
        uses: actions/upload-artifact@v4
        with:
          name: helm-chart
          path: dist/*.tgz
          retention-days: 7

