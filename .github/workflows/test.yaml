name: Test

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

jobs:
  helm-template:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        values:
          - ""
          # Uncomment as profiles are added:
          # - "-f charts/kube-llmops-stack/values-minimal.yaml"
          # - "-f charts/kube-llmops-stack/values-ci.yaml"
    steps:
      - uses: actions/checkout@v4

      - name: Set up Helm
        uses: azure/setup-helm@v4
        with:
          version: v3.16.0

      - name: Helm template (dry-run render)
        run: |
          helm template test-release charts/kube-llmops-stack/ ${{ matrix.values }} > /dev/null
          echo "Template rendering succeeded"
