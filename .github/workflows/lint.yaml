name: Lint

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

jobs:
  helm-lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Helm
        uses: azure/setup-helm@v4
        with:
          version: v3.16.0

      - name: Helm lint
        run: helm lint charts/kube-llmops-stack/

  chart-testing-lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Helm
        uses: azure/setup-helm@v4
        with:
          version: v3.16.0

      - name: Set up chart-testing
        uses: helm/chart-testing-action@v2

      - name: Run ct lint
        run: ct lint --config ct.yaml --charts charts/kube-llmops-stack

  yaml-lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install yamllint
        run: pip install yamllint

      - name: Run yamllint
        run: |
          yamllint -c .yamllint.yml charts/kube-llmops-stack/values.yaml
          find charts/ -name 'values-*.yaml' -exec yamllint -c .yamllint.yml {} +

  shell-lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Run shellcheck
        run: |
          if find scripts -name '*.sh' 2>/dev/null | grep -q .; then
            find scripts -name '*.sh' -exec shellcheck {} +
          else
            echo "No shell scripts found, skipping"
          fi

  markdown-lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: DavidAnson/markdownlint-cli2-action@v19
        with:
          globs: "**/*.md"
          config: .markdownlint.json

  python-lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install ruff
        run: pip install ruff

      - name: Run ruff linter
        run: ruff check images/

      - name: Run ruff formatter check
        run: ruff format --check images/

  dockerfile-lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Lint Dockerfiles with hadolint
        uses: hadolint/hadolint-action@v3.1.0
        with:
          dockerfile: images/model-resolver/Dockerfile

      - name: Lint model-loader Dockerfile
        uses: hadolint/hadolint-action@v3.1.0
        with:
          dockerfile: images/model-loader/Dockerfile
